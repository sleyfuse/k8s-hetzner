---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-torbox
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""
  volumeName: pv-torbox
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-torbox
  namespace: media
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  csi:
    driver: rclone.csi.veloxpack.io
    volumeHandle: pv-torbox
    volumeAttributes:
      remote: "torbox"
      remotePath: ""
      configData: |
        [torbox]
        type = webdav
        url = http://webdav.torbox.app
        user = aroden95@proton.me
        pass = bkRsLeiKrBYBObNBgKHHjbDqpWqGCXDFJYZP7QMibEWkOvwG
        vendor = other
        pacer_min_sleep = 15s
  mountOptions:
    - allow-other
    - allow-non-empty
    - attr-timeout=10y
    - buffer-size=64M
    - checkers=16
    - dir-cache-time=120s
    - multi-thread-streams=0
    - poll-interval=60s
    - transfers=16
    - vfs-cache-max-age=2M
    - vfs-cache-mode=full
    - vfs-cache-poll-interval=30s
    - vfs-fast-fingerprint
    - vfs-read-ahead=64M
    - vfs-read-chunk-size=2M
    - vfs-read-chunk-size-limit=64M
    - vfs-read-chunk-streams=4
    - vfs-read-wait=40ms
    - vfs-refresh
    - no-modtime
    - no-checksum
