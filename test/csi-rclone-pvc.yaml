---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-torbox
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""
  volumeName: pv-torbox
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-torbox
  namespace: media
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  csi:
    driver: rclone.csi.veloxpack.io
    volumeHandle: pv-debrid
    volumeAttributes:
      remote: "torbox"
      remotePath: ""
      configData: |
        [torbox]
        type = webdav
        url = http://torbox:9999/dav
        vendor = other
        pacer_min_sleep = 0
  mountOptions:
    - allow-other
    - allow-non-empty
    - dir-cache-time=10s
    - vfs-cache-mode=full
