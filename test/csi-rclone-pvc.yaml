---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-torbox
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""
  volumeName: pv-torbox
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-torbox
  namespace: media
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  csi:
    driver: rclone.csi.veloxpack.io
    volumeHandle: pv-torbox
    volumeAttributes:
      remote: "torbox"
      remotePath: ""
      configData: |
        [torbox]
        type = webdav
        url = http://webdav.torbox.app
        user = aroden95@proton.me
        pass = bkRsLeiKrBYBObNBgKHHjbDqpWqGCXDFJYZP7QMibEWkOvwG
        vendor = other
        pacer_min_sleep = 0
  mountOptions:
    - allow-other
    - allow-non-empty
    - uid=1000
    - gid=1000
    - poll-interval=0
    - dir-cache-time=10s
    - vfs-cache-mode=full
    - vfs-read-chunk-size=1M
    - vfs-read-chunk-size-limit=32M
    - buffer-size=64M
    - vfs-cache-max-age=6h
    - vfs-cache-max-size=100G
    - attr-timeout=1s
    - tpslimit=10
    - tpslimit-burst=10
    - no-modtime
    - no-checksum
