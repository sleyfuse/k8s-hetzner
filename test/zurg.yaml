apiVersion: v1
kind: Service
metadata:
  name: zurg
  namespace: media
spec:
  selector:
    app: zurg
  ports:
    - port: 9999
      targetPort: 9999
---
apiVersion: app/v1
kind: Deployment
metadata:
  name: zurg
  namespace: media
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: zurg
    spec:
      containers:
        - name: zurg
          image: ghcr.io/debridmediamanager/zurg-testing:latest
          ports:
            - 9999:9999
          volumeMounts:
            - name: zurg-config
              mountPath: /app/config/config.yml
              subPath: config.yml
            - name: zurg-data
              mountPath: /app/data
      volumes:
        - name: zurg-config
          configMap:
            name: zurg-config
        - name: zurg-data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zurg-config
  namespace: media
data:
  config.yml: |
    # Zurg configuration
    port: 9999
