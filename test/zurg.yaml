apiVersion: v1
kind: Service
metadata:
  name: zurg
  namespace: media
spec:
  selector:
    app: zurg
  ports:
    - port: 9999
      targetPort: 9999
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zurg
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zurg
  template:
    metadata:
      labels:
        app: zurg
    spec:
      containers:
        - name: zurg
          image: ghcr.io/debridmediamanager/zurg-testing:latest
          ports:
            - containerPort: 9999
          volumeMounts:
            - name: zurg-config
              mountPath: /app/config.yml
              subPath: config.yml
            - name: zurg-data
              mountPath: /app/data
      volumes:
        - name: zurg-config
          configMap:
            name: zurg-config
        - name: zurg-data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zurg-config
  namespace: media
data:
  config.yml: |
    zurg: v1
    token: V3TUMC3CMM3UJ7KI5UCLAF5Q5TIVCDRH5QPPUKKCWIUTAPMQW7PQ
    check_for_changes_every_secs: 10
    enable_repair: true
    auto_delete_rar_torrents: true
    directories:
      anime:
        group_order: 10
        group: media
        filters:
          - regex: /\b[a-fA-F0-9]{8}\b/
          - any_file_inside_regex: /\b[a-fA-F0-9]{8}\b/
      shows:
        group_order: 20
        group: media
        filters:
          - has_episodes: true
      movies:
        group_order: 30
        group: media
        only_show_the_biggest_file: true
        filters:
          - regex: /.*/
