apiVersion: v1
kind: Service
metadata:
  name: clidebrid
  namespace: media
spec:
  selector:
    app: clidebrid
  ports:
    - port: 5000
      targetPort: 5000
      name: port1
    - port: 5001
      targetPort: 5001
      name: port2
    - port: 8888
      targetPort: 8888
      name: port3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clidebrid
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clidebrid
  template:
    metadata:
      labels:
        app: clidebrid
    spec:
      containers:
        - name: clidebrid
          image: godver3/cli_debrid:dev
          securityContext:
            privileged: true
          ports:
            - containerPort: 5000
            - containerPort: 5001
            - containerPort: 8888
          volumeMounts:
            - name: rclone-debrid-pvc
              mountPath: /mnt
            - name: cli-debrid-pvc
              mountPath: /app/data
            - name: symlink-pvc
              mountPath: /media
            - name: fuse
              mountPath: /dev/fuse
          resources:
            requests:
              nextflow.io/fuse: "1"
            limits:
              nextflow.io/fuse: "1"
      volumes:
        - name: cli-debrid-pvc
          persistentVolumeClaim:
            claimName: cli-debrid
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: rclone-debrid-pvc
          persistentVolumeClaim:
            claimName: pvc-debrid
        - name: symlink-pvc
          persistentVolumeClaim:
            claimName: symlink
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cli-debrid
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: proxmox-data-xfs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: symlink
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
