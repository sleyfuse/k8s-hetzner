apiVersion: v1
kind: Service
metadata:
  name: cli_debrid
  namespace: media
spec:
  selector:
    app: cli_debrid
  ports:
    - port: 5000
      targetPort: 5000
    - port: 5001
      targetPort: 5001
    - port: 8888
      targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli_debrid
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cli_debrid
  template:
    metadata:
      labels:
        app: cli_debrid
    spec:
      containers:
        - name: cli_debrid
          image: godver3/cli_debrid:dev
          ports:
            - containerPort: 5000
            - containerPort: 5001
            - containerPort: 8888
          volumeMounts:
            - name: rclone-debrid-pvc
              mountPath: /mnt
            - name: cli-debrid-pvc
              mountPath: /app/data
            - name: symlink-pvc
              mountPath: /media
          resources:
            requests:
              nextflow.io/fuse: "1"
            limits:
              nextflow.io/fuse: "1"
      volumes:
        - name: cli-debrid-pvc
          persistentVolumeClaim:
            claimName: pvc-debrid
        - name: rclone-debrid-pvc
          persistentVolumeClaim:
            claimName: pvc-debrid
        - name: symlink-pvc
          persistentVolumeClaim:
            claimName: pvc-debrid
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-debrid
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: rclone-debrid
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-debrid
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: rclone-debrid
