kind: Service
apiVersion: v1
metadata:
  name: cinesync
  namespace: media
spec:
  selector:
    app: cinesync
  ports:
    - name: web
      port: 5173
      targetPort: 5173
    - name: api
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinesync
  namespace: media
  labels:
    app: cinesync
spec:
  selector:
    matchLabels:
      app: cinesync
  template:
    metadata:
      labels:
        app: cinesync
    spec:
      containers:
        - image: sureshfizzy/cinesync:latest
          name: cinesync
          securityContext:
            privileged: true
          env:
            - name: "PUID"
              value: "0"
            - name: "PGID"
              value: "0"
            - name: "TZ"
              value: "Europe/Helsinki"
            - name: "TMDB_API_KEY"
              value: "ae27e67e1e4750c5fb9bb473d342dc13"
            - name: "SOURCE_DIR"
              value: "/mnt/decypharr/__all__"
            - name: "DESTINATION_DIR"
              value: "/mnt/cinesync"
            - name: "CINESYNC_IP"
              value: "0.0.0.0"
            - name: "CINESYNC_API_PORT"
              value: "8082"
            - name: "CINESYNC_UI_PORT"
              value: "5173"
            - name: "CINESYNC_AUTH_ENABLED"
              value: "true"
            - name: "CINESYNC_USERNAME"
              value: "admin"
            - name: "CINESYNC_PASSWORD"
              value: "admin"
            - name: "CINESYNC_LAYOUT"
              value: "true"
            - name: "4K_SEPERATION"
              value: "false"
            - name: "ANIME_SEPERATION"
              value: "true"
            - name: "AUTO_PROCESSING_ENABLED"
              value: "true"
          ports:
            - containerPort: 5173
            - containerPort: 8082
          volumeMounts:
            - mountPath: /db
              name: cinesync-data
            - name: fuse
              mountPath: /dev/fuse
          resources:
            requests:
              nextflow.io/fuse: "1"
            limits:
              nextflow.io/fuse: "1"
      volumes:
        - name: cinesync-data
          persistentVolumeClaim:
            claimName: cinesync-data
        - name: fuse
          hostPath:
            path: /dev/fuse
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cinesync-data
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: proxmox-data-xfs
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cinesync
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cinesync.alixroden.co.uk`)
      kind: Rule
      services:
        - name: cinesync
          port: 5173
  tls:
    secretName: alixroden-co-uk-tls
