kind: Service
apiVersion: v1
metadata:
  name: cinesync
  namespace: media
spec:
  selector:
    app: cinesync
  ports:
    - name: web
      port: 5173
      targetPort: 5173
    - name: api
      port: 8082
      targetPort: 8082
---
apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: cinesync
  namespace: media
  labels:
    app: cinesync
spec:
  template:
    metadata:
      labels:
        app: cinesync
    spec:
      containers:
        - image: sureshfizzy/cinesync:latest
          name: cinesync
          env:
            - name: "PUID"
              value: "1000"
            - name: "PGID"
              value: "1000"
            - name: "TZ"
              value: "UTC"
          ports:
            - containerPort: 5173
            - containerPort: 8082
          volumeMounts:
            - mountPath: /db
              name: cinesync-data
      volumes:
        - name: cinesync-data
          hostPath: /data
      restartPolicy: Always
      imagePullPolicy: Always
