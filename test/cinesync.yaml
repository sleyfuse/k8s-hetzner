kind: Service
apiVersion: v1
metadata:
  name: cinesync
  namespace: media
spec:
  selector:
    app: cinesync
  ports:
    - name: web
      port: 5173
      targetPort: 5173
    - name: api
      port: 8082
      targetPort: 8082
---
apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: cinesync
  namespace: media
  labels:
    app: cinesync
spec:
  template:
    metadata:
      labels:
        app: cinesync
    spec:
      containers:
        - image: sureshfizzy/cinesync:latest
          name: cinesync
          env:
            - name: "PUID"
              value: "1000"
            - name: "PGID"
              value: "1000"
            - name: "TZ"
              value: "Europe/Helsinki"
            - name: "TMDB_API_KEY"
              value: ""
            - name: "SOURCE_DIR"
              value: "/mnt/decypharr/__all__"
            - name: "DESTINATION_DIR"
              value: "/mnt/cinesync"
            - name: "CINESYNC_IP"
              value: "0.0.0.0"
            - name: "CINESYNC_API_PORT"
              value: "8082"
            - name: "CINESYNC_UI_PORT"
              value: "5173"
            - name: "CINESYNC_AUTH_ENABLED"
              value: "true"
            - name: "CINESYNC_USERNAME"
              value: "admin"
            - name: "CINESYNC_PASSWORD"
              value: "admin"
            - name: "CINESYNC_LAYOUT"
              value: "true"
            - name: "4K_SEPERATION"
              value: "false"
            - name: "ANIME_SEPERATION"
              value: "true"
            - name: "AUTO_PROCESSING_ENABLED"
              value: "true"
          ports:
            - containerPort: 5173
            - containerPort: 8082
          volumeMounts:
            - mountPath: /db
              name: cinesync-data
      volumes:
        - name: cinesync-data
          hostPath: /data
      restartPolicy: Always
      imagePullPolicy: Always
