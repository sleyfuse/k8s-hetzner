---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: valkey
  namespace: flux-system
spec:
  interval: 1h
  url: https://valkey.io/valkey-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: valkey-operator
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
  releaseName: valkey
  install:
    createNamespace: true
  targetNamespace: valkey-operator-system
  storageNamespace: valkey-operator-system
---
apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: valkey
  namespace: infra
spec:
  shards: 1
  replicas: 0
  config:
    io-threads: 4
    maxmemory-policy: noeviction
  users:
    - name: app
      nopass: true
      permissions: "+@all ~* &*"
  persistence:
    size: 10Gi
    storageClass: proxmox-csi-xfs
    reclaimPolicy: Retain
