---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: valkey
  namespace: flux-system
spec:
  interval: 1h
  url: https://valkey.io/valkey-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: valkey-operator
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
  releaseName: valkey
  install:
    createNamespace: true
  targetNamespace: valkey-operator-system
  storageNamespace: valkey-operator-system
---
apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: my-cluster
spec:
  shards: 3
  replicas: 1
