apiVersion: v1
kind: Service
metadata:
  name: aiostreams
  namespace: media
spec:
  selector:
    app: aiostreams
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiostreams
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiostreams
  template:
    metadata:
      labels:
        app: aiostreams
    spec:
      containers:
        - name: aiostreams
          image: ghcr.io/viren070/aiostreams:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: aiostreams-data
              mountPath: /app/data
          envFrom:
            - configMapRef:
                name: aiostreams-config
          env:
            - name: BASE_URL
              value: ${BASE_URL}
            - name: REDIS_URI
              value: redis://valkey.infra.svc.cluster.local:6379
            - name: SECRET_KEY
              value: ${SECRET_KEY}
            - name: DATABASE_URI
              value: ${DATABASE_URI}
            - name: INTERNAL_URL
              value: ${INTERNAL_URL}
            - name: SYSTEM_LIFECYCLE_ENABLED
              value: "false"
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: AIOSTREAMS_AUTH
              value: ${AIOSTREAMS_AUTH}
            - name: AIOSTREAMS_AUTH_ADMINS
              value: ${AIOSTREAMS_AUTH_ADMINS}
      volumes:
        - name: aiostreams-data
          persistentVolumeClaim:
            claimName: pvc-aiostreams
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-aiostreams
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: rclone-debrid
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aiostreams
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`aiostreams.media.alixroden.com`)
      kind: Rule
      services:
        - name: aiostreams
          port: 3000
  tls:
    secretName: alixroden-co-uk-tls
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiostreams-config
  namespace: media
  labels:
    app: aiostreams
data:
  BASE_URL: "https://aiostreams.media.alixroden.com"
  SECRET_KEY: "a03b8f7ba8ba4b0eae9a4f8c0882969b3be8b81e289c8a8e1091017d2f2e45e2"
  DATABASE_URI: "postgres://app:6WcQS7IvEm988NeNvAvImWDnEyB6mKjXWAUUymLNRmUYiW765mp6VDmUIJNdvfSk@postgresql-rw.infra.svc.cluster.local:5432/aiostreams"
  INTERNAL_URL: "http://aiostreams:3000"
  AIOSTREAMS_AUTH: "admin:KXX14cdup$"
  AIOSTREAMS_AUTH_ADMINS: "admin"
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: aiostreams-db
  namespace: infra
spec:
  name: aiostreams
  owner: app
  cluster:
    name: postgresql
