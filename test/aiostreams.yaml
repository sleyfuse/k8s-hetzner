apiVersion: v1
kind: Service
metadata:
  name: aiostreams
  namespace: media
spec:
  selector:
    app: aiostreams
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiostreams
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiostreams
  template:
    metadata:
      labels:
        app: aiostreams
    spec:
      containers:
        - name: aiostreams
          image: ghcr.io/viren070/aiostreams:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: aiostreams-data
              mountPath: /app/data
          env:
            - name: BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: BASE_URL
            - name: REDIS_URI
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: REDIS_URI
            - name: SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: SECRET_KEY
            - name: DATABASE_URI
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: DATABASE_URI
            - name: INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: INTERNAL_URL
            - name: SYSTEM_LIFECYCLE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: SYSTEM_LIFECYCLE_ENABLED
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: NODE_ENV
            - name: AIOSTREAMS_AUTH
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: AIOSTREAMS_AUTH
            - name: AIOSTREAMS_AUTH_ADMINS
              valueFrom:
                configMapKeyRef:
                  name: aiostreams-config
                  key: AIOSTREAMS_AUTH_ADMINS
      volumes:
        - name: aiostreams-data
          persistentVolumeClaim:
            claimName: pvc-aiostreams
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-aiostreams
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: rclone-debrid
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aiostreams
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`aiostreams.alixroden.co.uk`)
      kind: Rule
      services:
        - name: aiostreams
          port: 3000
  tls:
    secretName: alixroden-co-uk-tls
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiostreams-config
  namespace: media
  labels:
    app: aiostreams
data:
  BASE_URL: "https://aiostreams.alixroden.co.uk"
  SECRET_KEY: "9f910a7ba92ba8204a9bfe628e82742aced6b2d72244ed5b04183de1024da6c5"
  DATABASE_URI: "postgres://app:6WcQS7IvEm988NeNvAvImWDnEyB6mKjXWAUUymLNRmUYiW765mp6VDmUIJNdvfSk@postgresql-rw.infra.svc.cluster.local:5432/aiostreams"
  INTERNAL_URL: "http://aiostreams:3000"
  AIOSTREAMS_AUTH: "admin:KXX14cdup$"
  AIOSTREAMS_AUTH_ADMINS: "admin"
  REDIS_URI: "redis://valkey.infra.svc.cluster.local:6379"
  SYSTEM_LIFECYCLE_ENABLED: "false"
  PORT: "3000"
  NODE_ENV: "production"
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: aiostreams-db
  namespace: infra
spec:
  name: aiostreams
  owner: app
  cluster:
    name: postgresql
