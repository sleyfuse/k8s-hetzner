apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infra # This is relative to the root of the GitRepo, not the file location
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system # Matches the name in your gotk-sync.yaml
