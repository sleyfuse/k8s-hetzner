apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.alixroden.co.uk
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`keycloak.alixroden.co.uk`)
      kind: Rule
      services:
        - kind: Service
          name: keycloak-service
          port: 8080
  tls:
    secretName: alixroden-co-uk-tls
