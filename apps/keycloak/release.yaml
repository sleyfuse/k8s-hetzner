---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: flux-system
spec:
  chart:
    spec:
      chart: keycloak
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cloudpirates
        namespace: flux-system
      version: "0.21.9"
  valuesFrom:
    - kind: ConfigMap
      name: keycloak-values
  install:
    createNamespace: true
  interval: 1m0s
  releaseName: keycloak
  storageNamespace: keycloak
  targetNamespace: keycloak
