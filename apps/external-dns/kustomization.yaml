apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- repo.yaml
- release.yaml
- secret.yaml
- kustomizeconfig.yaml
- values.yaml
configMapGenerator:
- files:
  - values.yaml
  name: external-dns-values
  namespace: flux-system
  options:
    labels:
      reconcile.fluxcd.io/watch: Enabled
configurations:
- kustomizeconfig.yaml
generatorOptions:
  disableNameSuffixHash: true
