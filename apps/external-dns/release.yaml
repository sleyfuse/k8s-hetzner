---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  chart:
    spec:
      chart: external-dns
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      version: "v1.20.2"
  install:
    createNamespace: true
  interval: 1m0s
  releaseName: external-dns
  storageNamespace: external-dns
  targetNamespace: external-dns
  values:
    crds:
      enabled: true
