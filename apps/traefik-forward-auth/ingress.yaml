---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-forward-auth
  namespace: traefik
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.alixroden.co.uk
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`tfa.alixroden.co.uk`)
      services:
        - name: traefik-forward-auth
          port: 4181
          namespace: traefik
          scheme: http
  tls:
    secretName: alixroden-co-uk-tls
