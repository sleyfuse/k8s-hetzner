apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: web
      namespace: infra
      sectionName: websecure-gw
  hostnames:
    - "alixroden.co.uk"
    - "www.alixroden.co.uk"
  rules:
    - backendRefs:
        - name: homepage
          port: 3000
