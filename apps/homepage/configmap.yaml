apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  settings.yaml: ""
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  services.yaml: |
    - Cluster:
      - ControlPlane:
          icon: kubernetes.png
          proxmoxNode: pve
          proxmoxVMID: 100
          widget:
            type: glances
            url: http://192.168.1.100:61208
            metric: process
            version: 4
      - Worker1:
          icon: kubernetes.png
          proxmoxNode: pve
          proxmoxVMID: 101
          widget:
            type: glances
            url: http://192.168.1.101:61208
            metric: process
            version: 4
      - Worker2:
          icon: kubernetes.png
          proxmoxNode: pve
          proxmoxVMID: 102
          widget:
            type: glances
            url: http://192.168.1.102:61208
            metric: process
            version: 4
  proxmox.yaml: |
    pve:
      url: "https://alixroden.co.uk:8006"
      token: "a95c3d2e-5ca9-4437-ab81-62ba20ca8b89"
      secret: "kubernetes@pve!ccm"
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "kubernetes"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
  docker.yaml: ""
