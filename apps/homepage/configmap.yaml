apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  settings.yaml: |
    title: "alixroden.co.uk"
    theme: dark
    color: rose
    background: 
      image: https://images.unsplash.com/photo-1557264322-b44d383a2906?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
      blur: sm
    cardBlur: md
    layout:
      Administration:
        style: row
        columns: 6
    headerStyle: boxed
    target: _blank
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  services.yaml: |
    - Cluster:
      - ControlPlane:
          widget:
            type: glances
            url: http://192.168.1.100:61208
            metric: process
            version: 4
      - Worker1:
          widget:
            type: glances
            url: http://192.168.1.101:61208
            metric: process
            version: 4
      - Worker2:
          widget:
            type: glances
            url: http://192.168.1.102:61208
            metric: process
            version: 4
  proxmox.yaml: |
    pve:
      url: "https://alixroden.co.uk:8006"
      token: "a95c3d2e-5ca9-4437-ab81-62ba20ca8b89"
      secret: "kubernetes@pve!ccm"
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "kubernetes"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
  docker.yaml: ""
