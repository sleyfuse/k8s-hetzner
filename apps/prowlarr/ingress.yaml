apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.alixroden.co.uk
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prowlarr.alixroden.co.uk`)
      kind: Rule
      services:
        - name: prowlarr
          port: 9696
          namespace: media
          scheme: http
      middlewares:
        - name: traefik-forward-auth
          namespace: traefik
  ingressClassName: traefik
  tls:
    secretName: alixroden-co-uk-tls
