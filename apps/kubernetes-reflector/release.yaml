---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-reflector
  namespace: flux-system
spec:
  chart:
    spec:
      chart: reflector
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
  interval: 30m
  releaseName: kubernetes-reflector
  install:
    createNamespace: true
  storageNamespace: cert-manager
  targetNamespace: cert-manager
