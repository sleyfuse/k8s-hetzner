---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: authelia
      version: 0.11.6
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: authelia-values
  install:
    createNamespace: true
  releaseName: authelia
  storageNamespace: authelia
  targetNamespace: authelia
