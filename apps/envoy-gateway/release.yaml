---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-crds
  namespace: flux-system
spec:
  chart:
    spec:
      chart: gateway-crds-helm
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
      version: "v0.7.0"
  interval: 1m0s
  releaseName: envoy-gateway-crds
  values:
    crds:
      gatewayAPI:
        enabled: false
      envoyGateway:
        enabled: true
  storageNamespace: kube-system
  targetNamespace: kube-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  chart:
    spec:
      chart: gateway-helm
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
      version: "v0.7.0"
  install:
    createNamespace: true
    crds: "Skip"
  interval: 1m0s
  releaseName: envoy-gateway
  storageNamespace: envoy-gateway-system
  targetNamespace: envoy-gateway-system
