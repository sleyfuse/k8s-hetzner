---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: flux-system
spec:
  chart:
    spec:
      chart: plex-media-server
      sourceRef:
        kind: HelmRepository
        name: plex
        namespace: flux-system
  interval: 30m
  valuesFrom:
    - kind: ConfigMap
      name: plex-values
  install:
    createNamespace: true
  releaseName: plex
  storageNamespace: media
  targetNamespace: media
