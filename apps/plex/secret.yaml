    [Peer]
    PublicKey = IEfKWzQ52F81a7WtRp55PuTDHX6O2pAhYNwrapYaxxE=
    AllowedIPs = 0.0.0.0/0, ::/0
    Endpoint = wireguard.alixroden.co.uk:51820
type: Opaque
