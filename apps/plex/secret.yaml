apiVersion: v1
kind: Secret
metadata:
  name: wg-conf
  namespace: media
stringData:
  wg0.conf: |
    [Interface]
    Address = 10.5.0.2/24
    ListenPort = 51820
    PrivateKey = IIo2HaqHvptf4A/oTupHzz/uaN3J1PkTUynks0YO3VY=
