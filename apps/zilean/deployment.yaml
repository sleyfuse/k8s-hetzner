apiVersion: apps/v1
kind: Deployment
metadata:
  name: zilean
  namespace: media
spec:
  selector:
    matchLabels:
      app: zilean
  template:
    metadata:
      labels:
        app: zilean
      namespace: media
    spec:
      containers:
        - name: zilean
          image: ipromknight/zilean
          ports:
            - containerPort: 8181
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zilean-db-credentials
                  key: password
          volumeMounts:
            - name: zilean-data
              mountPath: /app/data
            - name: zilean-tmp
              mountPath: /tmp
          tty: true
      volumes:
        - name: zilean-data
          persistentVolumeClaim:
            claimName: zilean-data-pvc
        - name: zilean-tmp
          emptyDir:
            sizeLimit: "1Gi"
            medium: Memory
