# values.yaml
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`dashboard.alixroden.co.uk`)
    entryPoints:
      - web
providers:
  kubernetesGateway:
    enabled: true
  kubernetesCRD:
    allowCrossNamespace: true
gateway:
  listeners:
    web:
      port: 80
      namespacePolicy: # 3
        from: All
