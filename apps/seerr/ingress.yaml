apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seerr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.alixroden.co.uk
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`seerr.alixroden.co.uk`)
      kind: Rule
      services:
        - name: seerr-seerr-chart
          port: 80
          namespace: media
          scheme: http
      middlewares:
        - name: traefik-forward-auth
          namespace: traefik
  ingressClassName: traefik
  tls:
    secretName: alixroden-co-uk-tls
