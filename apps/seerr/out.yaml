apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: flux-system
spec:
  chart:
    spec:
      chart: seerr-chart
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: flux-system
      version: v3.2.0
  install:
    createNamespace: true
  interval: 1m0s
  releaseName: seerr
  storageNamespace: media
  targetNamespace: media
  valuesFrom:
  - kind: ConfigMap
    name: seerr-values
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: seerr
  namespace: flux-system
spec:
  interval: 1m0s
  secretRef:
    name: ghcr-auth
  type: oci
  url: oci://ghcr.io/seerr-team/seerr
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.alixroden.co.uk
  name: seerr
  namespace: media
spec:
  entryPoints:
  - websecure
  ingressClassName: traefik
  routes:
  - kind: Rule
    match: Host(`seerr.alixroden.co.uk`)
    middlewares:
    - name: traefik-forward-auth
      namespace: traefik
    services:
    - name: seerr
      namespace: media
      port: 80
      scheme: http
  tls:
    secretName: alixroden-co-uk-tls
