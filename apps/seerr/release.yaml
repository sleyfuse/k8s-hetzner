---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: flux-system
spec:
  chart:
    spec:
      chart: seerr-chart
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: flux-system
  install:
    createNamespace: true
  interval: 30m
  releaseName: seerr
  storageNamespace: media
  targetNamespace: media
