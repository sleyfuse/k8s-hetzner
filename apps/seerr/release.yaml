---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: flux-system
spec:
  chart:
    spec:
      chart: seerr
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: flux-system
      version: "0.5.7"
  valuesFrom:
    - kind: ConfigMap
      name: seerr-values
  install:
    createNamespace: true
  interval: 1m0s
  releaseName: seerr
  storageNamespace: media
  targetNamespace: media
