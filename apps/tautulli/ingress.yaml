apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tautulli
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/target: traefik.alixroden.co.uk
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`tautulli.alixroden.co.uk`)
      kind: Rule
      services:
        - name: tautulli
          port: 8181
          namespace: media
          scheme: http
  ingressClassName: traefik
  tls:
    secretName: alixroden-co-uk-tls
