pluginManager:
  enabled: true
config:
  inCluster: false
  extraArgs:
    - "-kubeconfig=/etc/headlamp/kubeconfig"
    - "-proxy-auth=true"
volumes:
  - name: kubeconfig
    configMap:
      name: headlamp-kubeconfig
volumeMounts:
  - name: kubeconfig
    mountPath: /etc/headlamp/kubeconfig
    subPath: kubeconfig
    readOnly: true
serviceAccount:
  create: true
  name: headlamp-sa
extraManifests:
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: headlamp-kubeconfig
      namespace: kube-system
    data:
      kubeconfig: |
        apiVersion: v1
        kind: Config
        clusters:
        - cluster:
            certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            server: https://kubernetes.default.svc
          name: in-cluster
        contexts:
        - context:
            cluster: in-cluster
            user: headlamp-sa
          name: in-cluster
        current-context: in-cluster
        users:
        - name: headlamp-sa
          user:
            tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
