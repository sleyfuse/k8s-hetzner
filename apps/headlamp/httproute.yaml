apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: kube-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: web
      namespace: infra
      sectionName: web-gw
  hostnames:
    - "headlamp.alixroden.co.uk"
  rules:
    - backendRefs:
        - name: headlamp
          port: 80
