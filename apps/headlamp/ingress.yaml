apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: kube-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`headlamp.alixroden.co.uk`)
      kind: Rule
      services:
        - kind: Service
          name: headlamp
          port: 80
      middlewares:
        - name: traefik-forward-auth
          namespace: traefik
