apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura
  namespace: media
spec:
  selector:
    matchLabels:
      app: aura
  template:
    metadata:
      labels:
        app: aura
      namespace: media
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: aura
          securityContext:
            privileged: true
          image: ghcr.io/mediux-team/aura
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
            - containerPort: 8888
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Europe/Helsinki"
          volumeMounts:
            - name: aura-config
              mountPath: /config
            - name: mediamount
              mountPath: /mnt
              mountPropagation: HostToContainer
          resources:
            requests:
              nextflow.io/fuse: "1"
            limits:
              nextflow.io/fuse: "1"
      volumes:
        - name: aura-config
          persistentVolumeClaim:
            claimName: aura-config-pvc
        - name: mediamount
          persistentVolumeClaim:
            claimName: media-pvc
