apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhooks-from-outside
  namespace: flux-system
spec:
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.1.0/24 # CHANGE THIS DEPENDING ON YOUR NETWORK LAYOUT
  podSelector:
    matchLabels:
      app: notification-controller
  policyTypes:
    - Ingress
