apiVersion: v1
kind: ConfigMap
metadata:
  name: external-dns-values
  namespace: infra
data:
  helm-values.yaml: |
    policy: sync
    provider:
      name: webhook
      webhook:
        image:
          repository: docker.io/hetzner/external-dns-hetzner-webhook
          tag: v0.3.3
        env:
          - name: HETZNER_TOKEN
            valueFrom:
              secretKeyRef:
                name: hetzner
                key: token
