apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: alixroden-co-uk-tls
  namespace: cert-manager
spec:
  secretName: alixroden-co-uk-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - alixroden.co.uk
    - "*.alixroden.co.uk"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
