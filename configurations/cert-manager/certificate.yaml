apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: alixroden-co-uk-tls
  namespace: cert-manager
  annotations:
    ://emberstack.com: "true"
spec:
  secretName: alixroden-co-uk-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - alixroden.co.uk
    - "*.alixroden.co.uk"
