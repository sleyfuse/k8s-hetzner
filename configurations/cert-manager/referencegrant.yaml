apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-certificate-access
  namespace: cert-manager
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: infra # The namespace of the Gateway that needs the secret
  to:
    - group: ""
      kind: Secret # Authorizes access to the TLS Secret
